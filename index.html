    <title>EquipRent | Tecnoloc</title>
    <!-- Tailwind Play CDN (Necessário para o motor JIT funcionar neste ambiente) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { DEFAULT: '#FF6B00', dark: '#E66000' },
              secondary: { DEFAULT: '#64748b' },
              accent: { DEFAULT: '#0F172A' }
            },
            padding: { 'safe': 'env(safe-area-inset-bottom)' },
            animation: {
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            },
            keyframes: {
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              }
            }
          }
        }
      }
    </script>

        margin: 0;

        overflow-x: hidden;
